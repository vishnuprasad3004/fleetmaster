services:
  db:
    image: timescale/timescaledb:2.14.2-pg16
    environment:
      POSTGRES_DB: fleetmaster
      POSTGRES_USER: fleetmaster
      POSTGRES_PASSWORD: fleetmaster
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A fleetmaster_backend worker -l INFO
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A fleetmaster_backend beat -l INFO
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    env_file:
      - ./ai-services/.env
    ports:
      - "9000:9000"

volumes:
  db_data:
  redis_data:
